services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mockinterview-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mockinterview
    ports:
      - "5432:5432"
    volumes:
      - mockinterview-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mockinterview"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mockinterview-pgdata:
